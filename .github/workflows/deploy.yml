name: Build and Deploy FMD Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'master_data.csv'
      - 'scripts/build_dashboard.py'
      - 'scripts/dashboard_template.html'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual rebuild (optional)'
        required: false
        default: 'Manual rebuild triggered from GitHub UI'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify required files
        run: |
          echo "Checking required files..."
          test -f master_data.csv || { echo "ERROR: master_data.csv not found"; exit 1; }
          test -f scripts/build_dashboard.py || { echo "ERROR: scripts/build_dashboard.py not found"; exit 1; }
          test -f scripts/dashboard_template.html || { echo "ERROR: scripts/dashboard_template.html not found"; exit 1; }
          echo "Row count: $(wc -l < master_data.csv) lines in master_data.csv"
          echo "All required files present."

      - name: Build FMD_Dashboard.html
        run: |
          python -c "
          import importlib.util
          spec = importlib.util.spec_from_file_location('build', 'scripts/build_dashboard.py')
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          "

      - name: Verify build output
        run: |
          test -f FMD_Dashboard.html || { echo "ERROR: FMD_Dashboard.html was not created"; exit 1; }
          grep -q "const DASHBOARD_DATA" FMD_Dashboard.html || { echo "ERROR: DASHBOARD_DATA not found in output"; exit 1; }
          SIZE=$(wc -c < FMD_Dashboard.html)
          echo "FMD_Dashboard.html size: $SIZE bytes"
          echo "Build output verified."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp FMD_Dashboard.html index.html
          SNAPSHOT=$(python -c "
          import csv
          rows = list(csv.DictReader(open('master_data.csv')))
          dates = sorted(set(r['effective_date'] for r in rows if r['source_org'] in ('AgriSA-NAT','ICC')))
          print(dates[-1] if dates else 'unknown')
          ")
          git add FMD_Dashboard.html index.html
          git diff --staged --quiet || git commit -m "chore: rebuild dashboard [snapshot ${SNAPSHOT}] [skip ci]"
          git push
          echo "Done (snapshot: ${SNAPSHOT})."

      - name: Build summary
        if: always()
        run: |
          echo "=============================="
          echo "  FMD Dashboard Build Summary"
          echo "=============================="
          echo "Trigger: ${{ github.event_name }}"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M UTC')"
          if [ -f FMD_Dashboard.html ]; then
            echo "Output: FMD_Dashboard.html ($(wc -c < FMD_Dashboard.html) bytes)"
          fi
          echo "=============================="
